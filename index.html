<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#0a84ff" />
  <title>早朝出勤日一覧</title>
  <link rel="stylesheet" href="./mobile.css" />
</head>
<body>
  <header class="appbar">
    <h1 class="title">早朝出勤日一覧</h1>
    <button id="btn-refresh" class="icon-btn" aria-label="更新">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.9 6h-2.06A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L14 10h8V2l-4.35 4.35z"/>
      </svg>
    </button>
  </header>

  <main class="main" role="main" aria-label="早朝出勤日一覧">
    <p class="note">
      行をタップすると予定（.ics）を作成し、<strong>前日21:00にリマインド</strong>が入ります。
    </p>

    <!-- ステータス（ローディング／エラー） -->
    <div id="status" class="status" role="status" aria-live="polite"></div>

    <!-- 予定リスト -->
    <ul id="time-list" class="list" aria-live="polite" aria-label="予定に登録する行一覧"></ul>
  </main>

  <footer class="footer">
    <small>最終更新: <span id="last-updated" aria-live="polite">—</span></small>
  </footer>

  <script>
    /*** 設定 *********************************************/
    const LOG_URL = "./public/log.txt"; // 1行 = 1イベント
    const DEFAULT_DURATION_MIN = 60;    // 予定長（分）
    /*****************************************************/

    const $ = (s, d=document) => d.querySelector(s);
    const $$ = (s, d=document) => Array.from(d.querySelectorAll(s));

    const elList = $('#time-list');
    const elStatus = $('#status');
    const elRefresh = $('#btn-refresh');
    const elUpdated = $('#last-updated');

    // 初回読み込み & 手動更新
    document.addEventListener('DOMContentLoaded', () => {
      refresh();
      elRefresh.addEventListener('click', () => refresh(true));
    });

    async function refresh(isManual=false) {
      try {
        setLoading(true);
        const res = await fetch(LOG_URL + '?t=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        renderTimeLinks(text);
        setStatus('');
        elUpdated.textContent = new Date().toLocaleString();
      } catch (e) {
        renderTimeLinks('');
        setStatus('読み込みに失敗しました。通信状況をご確認ください。');
        console.error(e);
      } finally {
        setLoading(false);
      }
    }

    function setLoading(loading) {
      elRefresh.classList.toggle('spin', loading);
      if (loading) {
        setStatus('読み込み中…');
      }
    }
    function setStatus(msg) {
      elStatus.textContent = msg || '';
      elStatus.classList.toggle('hidden', !msg);
    }

    /* ---------- パース＆描画 ---------- */
    // 例: "2026/02/10(火) 8:39:00"（曜日は無視）
    function parseJpDateLine(line) {
      const m = line.trim().match(
        /^(\d{4})\/(\d{1,2})\/(\d{1,2})(?:\(.+?\))?\s+(\d{1,2}):(\d{2})(?::(\d{2}))?$/
      );
      if (!m) return null;
      const [, yy, mm, dd, HH, MM, SS] = m;
      return new Date(
        Number(yy),
        Number(mm) - 1,
        Number(dd),
        Number(HH),
        Number(MM),
        SS ? Number(SS) : 0,
        0
      );
    }
    const pad2 = n => String(n).padStart(2, '0');

    function formatUtcForICS(d) {
      const y = d.getUTCFullYear();
      const m = pad2(d.getUTCMonth() + 1);
      const day = pad2(d.getUTCDate());
      const hh = pad2(d.getUTCHours());
      const mm = pad2(d.getUTCMinutes());
      const ss = pad2(d.getUTCSeconds());
      return `${y}${m}${day}T${hh}${mm}${ss}Z`;
    }

    function buildICS(title, startLocal, endLocal) {
      // 前日 21:00（ローカル）に絶対UTCアラーム
      const alarmLocal = new Date(startLocal.getTime());
      alarmLocal.setDate(alarmLocal.getDate() - 1);
      alarmLocal.setHours(21, 0, 0, 0);

      const now = new Date();
      const uid = `${startLocal.getTime()}-${Math.random().toString(36).slice(2)}@fast-spa`;

      const lines = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//rin//fast-spa//JP',
        'CALSCALE:GREGORIAN',
        'METHOD:PUBLISH',
        'BEGIN:VEVENT',
        `UID:${uid}`,
        `DTSTAMP:${formatUtcForICS(now)}`,
        `SUMMARY:${title}`,
        `DTSTART:${formatUtcForICS(startLocal)}`,
        `DTEND:${formatUtcForICS(endLocal)}`,
        'DESCRIPTION:早朝出勤日前日にリマインド通知',
        'BEGIN:VALARM',
        'ACTION:DISPLAY',
        'DESCRIPTION:前日21:00 リマインド',
        `TRIGGER;VALUE=DATE-TIME:${formatUtcForICS(alarmLocal)}`,
        'END:VALARM',
        'END:VEVENT',
        'END:VCALENDAR'
      ];
      return lines.join('\r\n');
    }

    function downloadICSFile(fileName, icsText) {
      const blob = new Blob([icsText], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    }

    function renderTimeLinks(text) {
      elList.innerHTML = '';
      const lines = (text || '').split(/\r?\n/).map(s => s.trim()).filter(Boolean);

      if (!lines.length) {
        const li = document.createElement('li');
        li.className = 'empty';
        li.textContent = 'log.txt に有効な日付行がありません。';
        elList.appendChild(li);
        return;
      }

      const frag = document.createDocumentFragment();

      for (const line of lines) {
        const start = parseJpDateLine(line);
        if (!start) continue;
        const end = new Date(start.getTime() + DEFAULT_DURATION_MIN * 60 * 1000);

        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'row';
        btn.setAttribute('aria-label', `${line} をカレンダー登録（.ics生成）`);

        // 見出し＋補助
        const primary = document.createElement('span');
        primary.className = 'primary';
        primary.textContent = line;

        const secondary = document.createElement('span');
        secondary.className = 'secondary';
        secondary.textContent = 'タップで.ics作成（1時間）';

        btn.appendChild(primary);
        btn.appendChild(secondary);

        btn.addEventListener('click', () => {
          const ics = buildICS('早朝出勤', start, end);
          const fname = `${start.getFullYear()}${pad2(start.getMonth() + 1)}${pad2(start.getDate())}_${pad2(start.getHours())}${pad2(start.getMinutes())}.ics`;
          downloadICSFile(fname, ics);
        });

        li.appendChild(btn);
        frag.appendChild(li);
      }
      elList.appendChild(frag);
    }
  </script>
</body>
</html>
